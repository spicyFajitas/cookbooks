- name: Install Docker Engine on Debian/Ubuntu
  when: ansible_facts['pkg_mgr'] == "apt"
  become: true
  block:
    - name: Remove conflicting packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - docker-compose-v2
          - podman-docker
        state: absent
        purge: true
        autoremove: true

    - name: Ensure directory for apt keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker Engine + Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Install Docker Engine on RHEL/Alma/CentOS
  when: ansible_facts['pkg_mgr'] in ["yum", "dnf"]
  become: true
  block:
    - name: Remove podman docker shim (prevents docker==podman)
      ansible.builtin.package:
        name: podman-docker
        state: absent

    - name: Remove old/conflicting docker packages (distro versions)
      ansible.builtin.package:
        name:
          - docker
          - docker-client
          - docker-client-latest
          - docker-common
          - docker-latest
          - docker-latest-logrotate
          - docker-logrotate
          - docker-engine
        state: absent

    - name: Install dnf plugins
      ansible.builtin.package:
        name: dnf-plugins-core
        state: present

    - name: Add Docker CE repo
      ansible.builtin.command: >
        dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Install Docker Engine + Compose plugin
      ansible.builtin.package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Check docker is real docker (not podman shim)
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false
  become: true

- name: Fail if docker is podman shim
  ansible.builtin.fail:
    msg: "docker is still podman shim on {{ inventory_hostname }}: {{ docker_version.stdout }}"
  when: "'Emulate Docker CLI using podman' in docker_version.stdout"

- name: Verify docker compose v2 is available
  ansible.builtin.command: docker compose version
  register: compose_version
  changed_when: false
  become: true
