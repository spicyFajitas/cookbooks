---
# Single entry point for configuring every host in this repo.
#
# Any host that lands in a group below (whether from inventory/static.yml or
# auto-discovered by the dynamic Proxmox/DigitalOcean inventory plugins) gets
# that group's role applied the same way -- no per-host special-casing, no
# picking the "right" playbook file. This replaces the old one-playbook-
# per-service structure (server-*.yml).
#
# Usage:
#   ansible-playbook site.yml -i inventory --vault-password-file vault-pass.txt
#   ansible-playbook site.yml -i inventory --vault-password-file vault-pass.txt --tags plex
#   ansible-playbook site.yml -i inventory --vault-password-file vault-pass.txt --tags docker_host --limit docker-host-01
#
# See readme.md for the full tag list and the dynamic-inventory setup.

- name: Apply baseline helper roles
  hosts: common, proxmox
  become: true
  become_method: ansible.builtin.sudo
  tags: [common, helper]
  roles:
    - helper/packages
    - helper/ssh
    - helper/timezone

- name: Configure the Ansible controller
  hosts: ansible
  become: true
  become_method: ansible.builtin.sudo
  tags: [ansible]
  roles:
    - ansible_server

- name: Configure the self-hosted GitHub Actions runner
  hosts: runner
  become: true
  become_method: ansible.builtin.sudo
  tags: [runner]
  roles:
    - github_actions_runner
  vars_files:
    - roles/github_actions_runner/vaults/production.yml

- name: Configure the Docker host baseline
  hosts: docker_host
