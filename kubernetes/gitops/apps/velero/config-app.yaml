apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/spicyFajitas/cookbooks.git
    targetRevision: main
    path: kubernetes/gitops/apps/velero/config
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
