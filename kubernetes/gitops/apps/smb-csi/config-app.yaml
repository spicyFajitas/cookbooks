apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smb-csi-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/spicyFajitas/cookbooks.git
    feat/k3s-chatgpt-codex-testing
    path: kubernetes/gitops/apps/smb-csi/config
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
