# Deliberately LAN-only, not on the public wildcard tunnel route --
# an admin/deploy tool doesn't need public internet exposure just because
# every app does by default. Opts into external-dns explicitly
# (`external-dns-managed: "true"` + un-proxied) instead, per the internal-only
# pattern in kubernetes/platform/external-dns/readme.md -- resolves to
# Traefik's LAN IP, only reachable from inside the network.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns-managed: "true"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.spicyfajitas.com
      secretName: argocd-server-tls
  rules:
    - host: argocd.spicyfajitas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: http
