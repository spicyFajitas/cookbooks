apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: pve-token
  namespace: monitoring
spec:
  secretTemplates:
    - name: pve-token
      stringData:
        pve.yml: |
          default:
              user: api@pam
              token_name: "prometheus-exporter"
              token_value: "REPLACE_WITH_REAL_VALUE"
              verify_ssl: false
