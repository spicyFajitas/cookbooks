# edhrec-analyzer.json copied verbatim from
# ansible/roles/docker_services/files/edhrec-grafana-dashboard.json (itself
# copied from the magic app's own repo,
# monitoring/grafana/provisioning/dashboards/edhrec.json) -- re-copy from
# there if it's updated upstream, same as the old manual-import version
# required. One panel ("App Logs", uid: loki) won't work -- this migration
# doesn't include Loki (out of scope, see .claude-plan.md's "No
# observability yet" note). Every other panel (Prometheus-backed) works
# fully.
#
# kubernetes-cluster.json is hand-built for this repo (2026-07, added
# alongside 06-kube-state-metrics.yaml and the kubernetes-cadvisor scrape
# job in 01-prometheus.yaml) -- not a copy of a well-known community
# dashboard. The obvious well-known one (grafana.com dashboard 6417,
# "Kubernetes cluster monitoring") is schemaVersion 16 with
# singlestat/graph panels -- deprecated panel types actively being phased
# out of current Grafana, real risk of not rendering correctly. This one
# matches edhrec-analyzer.json's modern schemaVersion 39 style instead,
# scoped to exactly the two metrics sources actually wired up here
# (kube-state-metrics for object state, cAdvisor for CPU/memory usage).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  edhrec-analyzer.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "edhrec_analyses_started_total",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Analyses Started",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "edhrec_analyses_completed_total",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Analyses Completed",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "edhrec_analyses_failed_total",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Analyses Failed",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "edhrec_analyses_completed_total / edhrec_analyses_started_total * 100",
              "legendFormat": "Success Rate",
              "refId": "A"
            }
          ],
          "title": "Success Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "rate(edhrec_analyses_started_total[$__rate_interval])",
              "legendFormat": "Started",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "rate(edhrec_analyses_completed_total[$__rate_interval])",
              "legendFormat": "Completed",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "rate(edhrec_analyses_failed_total[$__rate_interval])",
              "legendFormat": "Failed",
              "refId": "C"
            }
          ],
          "title": "Analysis Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "histogram_quantile(0.50, rate(edhrec_analysis_duration_seconds_bucket[$__rate_interval]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "histogram_quantile(0.95, rate(edhrec_analysis_duration_seconds_bucket[$__rate_interval]))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "histogram_quantile(0.99, rate(edhrec_analysis_duration_seconds_bucket[$__rate_interval]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "title": "Analysis Duration",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "id": 7,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showTime": true,
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{container=\"edhrec-analyzer\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "App Logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["edhrec"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "EDHRec Analyzer",
      "uid": "edhrec-analyzer",
      "version": 1
    }
  kubernetes-cluster.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "mimir" }, "expr": "count(kube_node_info)", "legendFormat": "Nodes", "refId": "A" }
          ],
          "title": "Nodes",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready",
              "refId": "A"
            }
          ],
          "title": "Nodes Ready",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A"
            }
          ],
          "title": "Pods Running",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(kube_pod_status_phase{phase=\"Pending\"})",
              "legendFormat": "Pending",
              "refId": "A"
            }
          ],
          "title": "Pods Pending",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(kube_pod_status_phase{phase=\"Failed\"})",
              "legendFormat": "Failed",
              "refId": "A"
            }
          ],
          "title": "Pods Failed",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "Restarts (1h)",
              "refId": "A"
            }
          ],
          "title": "Container Restarts (1h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 7,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage by Pod (cores)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 8,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "sum(container_memory_working_set_bytes{container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Memory Usage by Pod",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "id": 9,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "kube_deployment_status_replicas_available",
              "legendFormat": "{{namespace}}/{{deployment}} available",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "mimir" },
              "expr": "kube_deployment_spec_replicas",
              "legendFormat": "{{namespace}}/{{deployment}} desired",
              "refId": "B"
            }
          ],
          "title": "Deployment Replicas (available vs desired)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubernetes"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "Kubernetes Cluster",
      "uid": "kubernetes-cluster",
      "version": 1
    }
