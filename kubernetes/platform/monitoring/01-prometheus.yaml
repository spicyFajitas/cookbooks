# Migrated from ansible/roles/docker_services/templates/grafana/ (2026-07).
# Dropped from the original scrape_configs: `docker-host` (node_exporter on
# docker-host itself -- docker-host is going away soon, not worth
# preserving host-level monitoring for it) and the `calcguard` job from
# extra.yml.j2 (dead config even in the docker-compose version -- rendered
# to disk but never actually mounted into the prometheus container or
# referenced by prometheus.yml, so it was never really being scraped;
# confirmed unused, dropped rather than carried forward).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 1m

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'pve'
        static_configs:
          - targets:
            - 10.100.10.10
        metrics_path: /pve
        params:
          module: [default]
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: pve-exporter.monitoring.svc.cluster.local:9221
      - job_name: 'magic-edhrec-analyzer'
        # k3s pod, scraped via the NodePort Service
        # (kubernetes/apps/magic/03-service.yaml) -- no in-cluster
        # Prometheus Operator/ServiceMonitor needed for a single app.
        scrape_interval: 15s
        static_configs:
          - targets: ['10.100.10.12:30852']
      - job_name: 'kube-state-metrics'
        # Kubernetes *object state* (pod phase, deployment replicas,
        # restarts, node conditions, ...) -- 06-kube-state-metrics.yaml.
        # clusterIP: None (headless) + a single replica means DNS resolves
        # directly to the one pod IP, no extra service-discovery needed.
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']
      - job_name: 'kubernetes-cadvisor'
        # Container resource *usage* (CPU/memory) -- distinct from
        # kube-state-metrics above. Routes through the API server proxy
        # (kubernetes.default.svc:443/api/v1/nodes/<node>/proxy/metrics/cadvisor)
        # rather than hitting the kubelet on :10250 directly. The proxy
        # approach avoids TLS cert mismatch issues (kubelet cert may not
        # include the node IP as a SAN) and only requires nodes/proxy RBAC
        # instead of fighting kubelet webhook auth. Standard pattern from
        # Prometheus's own documentation/examples/prometheus-kubernetes.yml.
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
---
# No storageClassName -- deliberately omitted, same reasoning and same
# real incident as kubernetes/apps/magic/01-pvc.yaml: hardcoded
# `local-path` (k3s's default) left this PVC permanently Pending on the
# temporary DOKS cluster, which has no StorageClass by that name. Omitting
# the field lets each cluster use its own default (k3s: local-path, DOKS:
# do-block-storage) instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# RBAC for the kubernetes-cadvisor scrape job above -- nodes/metrics plus
# the nonResourceURLs rule is specifically what authorizes a direct
# kubelet /metrics/cadvisor scrape (kubelet's own webhook authz mode
# delegates to a SubjectAccessReview against this exact non-resource URL,
# a different check than normal resource-based RBAC). Standard reference:
# Prometheus's own documentation/examples/rbac-setup.yml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate # avoid two pods fighting over the same RWO PVC
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      # fsGroup matches the image's UID (65534, nobody) -- without it, the
      # mounted PVC is root-owned and prometheus panics on startup
      # ("permission denied" opening its query log). Same real incident and
      # fix as grafana-data's PVC below: this only surfaced on DOKS's real
      # do-block-storage CSI driver, which doesn't share local-path's more
      # permissive default directory perms on k3s.
      securityContext:
        fsGroup: 65534
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --web.enable-lifecycle
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.path=/prometheus
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
