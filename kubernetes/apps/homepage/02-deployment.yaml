# Config change (01-configmap.yaml) doesn't auto-restart the pod -- this repo
# doesn't use kustomize's configMapGenerator (no other app here does either,
# keeping one pattern), so after editing the ConfigMap:
#   kubectl -n homepage rollout restart deployment/homepage
#
# /app/config is an emptyDir, NOT the ConfigMap directly: homepage's
# entrypoint auto-creates settings.yaml (and other defaults) on first boot
# if they're missing, by copying into /app/config. Mounting the ConfigMap
# there directly makes the whole directory read-only and that copy fails
# with EROFS, crash-looping the pod (found 2026-07 migrating this from
# docker-compose, where /opt/homepage/config was a normal writable host
# directory so this never came up). Our 3 managed files are layered in as
# individual read-only subPath mounts instead, leaving the rest of the
# directory writable for homepage's own use.
#
# No docker.sock mount (unlike the old docker-compose version): nothing in
# services.yaml actually uses Docker auto-discovery (`widget: type: docker`),
# it's all static entries -- and k3s nodes run containerd, not Docker, so
# there'd be no socket to mount anyway. Kubernetes auto-discovery IS wired
# up though (serviceAccountName below, RBAC in 05-rbac.yaml,
# kubernetes.yaml in 01-configmap.yaml) -- annotated Ingress objects across
# the cluster show up automatically, see kubernetes/apps/magic/04-ingress.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.spicyfajitas.com
          envFrom:
            - secretRef:
                name: homepage-vars
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: config-map
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config-map
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config-map
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config-map
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          # httpHeaders overrides the Host header the probe sends -- without
          # it, kubelet connects via pod IP, which HOMEPAGE_ALLOWED_HOSTS
          # (set to the public hostname above) rejects with a 403, and the
          # pod would never go Ready.
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: web
              httpHeaders:
                - name: Host
                  value: homepage.spicyfajitas.com
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: web
              httpHeaders:
                - name: Host
                  value: homepage.spicyfajitas.com
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          emptyDir: {}
        - name: config-map
          configMap:
            name: homepage-config
