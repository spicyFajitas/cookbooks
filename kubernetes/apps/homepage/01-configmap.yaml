# Ported from ansible/roles/docker_services/templates/homepage/*.yaml.j2.
# Secret values (proxmox creds, plex key, kuma domain) were Jinja2 vars
# there; here they're homepage's own {{HOMEPAGE_VAR_x}} substitution
# syntax, resolved from env vars sourced from secrets/homepage-vars.sops.yaml
# at container start -- see https://gethomepage.dev, "environment variables"
# for how that substitution works in any config file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
  services.yaml: |
    - Infrastructure:
        - Router:
            icon: asus-router.png
            href: http://10.100.10.1
            ping: http://10.100.10.1

        - Proxmox:
            icon: proxmox.png
            href: https://10.100.10.10:8006
            ping: https://10.100.10.10:8006
            widget:
                type: proxmox
                url: https://10.100.10.10:8006
                username: {{HOMEPAGE_VAR_PROXMOX_API_TOKEN_ID}}
                password: {{HOMEPAGE_VAR_PROXMOX_API_KEY}}

        - Alma Server Cockpit:
            icon: alma-linux
            href: https://10.100.10.9:9090
            ping: https://10.100.10.9:9090

        - TrueNAS:
            icon: truenas-scale.png
            href: https://10.100.10.15
            ping: https://10.100.10.15

  bookmarks.yaml: |
    - Homelab:
        - Documentation:
            - abbr: Docs
              href: https://spicyfajitas.github.io/cookbooks/

        - MTU Shell Website:
            - abbr: Shell
              href: https://shell.lug.mtu.edu/~adam/

        - Twingate:
            - abbr: TG
              href: https://spicynetwork.twingate.com/

        - Homepage Docs:
            - abbr: hp.dev
              href: https://gethomepage.dev/latest/

        - Homepage Icons:
            - abbr: icons
              href: https://dashboardicons.com/

        - Dashboard Icons:
            - abbr: icons
              href: https://dashboardicons.com/
  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        disk: /

    - search:
        provider: duckduckgo
        target: _blank

    - openmeteo:
        label: Lansing # optional
        latitude: 42.741555
        longitude: -84.661394
        timezone: America/Detroit # optional
        units: imperial # metric or imperial
        cache: 20 # Time in minutes to cache API responses, to stay within limits
