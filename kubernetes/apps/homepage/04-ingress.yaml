# Public via the Cloudflare Tunnel, no auth in front of it. That means
# anyone with the URL can view live Proxmox/Plex/Uptime-Kuma stats rendered
# here; the admin UIs it links to (Proxmox, TrueNAS, Cockpit) stay
# unreachable from outside the LAN regardless, since those are plain LAN
# IPs. If that changes, look at Cloudflare Access in front of this
# hostname.
#
# external-dns-managed: "true" -- opted in individually rather than relying
# on the *.spicyfajitas.com wildcard (kubernetes/platform/cloudflared/02-wildcard-dns.yaml).
# Found 2026-07 migrating this: the wildcard record exists correctly in
# Cloudflare (confirmed via API, certs Managed, byte-identical structure to
# magic's working record) but doesn't actually resolve -- a Cloudflare-side
# quirk with wildcard records on this zone, not a config error here, and a
# proxy toggle didn't fix it either.
#
# target + cloudflare-proxied are both REQUIRED, not optional here --
# external-dns's actual default (confirmed via its own startup config log,
# CloudflareProxied:false) is to derive the target from the Ingress's own
# LoadBalancer IP and create an *unproxied* A record. That's broken for a
# tunnel-routed app: Cloudflare's edge can't reach a private 10.x IP at
# all, proxied or not. magic.spicyfajitas.com's record only works because
# it was hand-created directly in Cloudflare, not generated by
# external-dns -- this is the first real test of external-dns creating a
# tunnel-routed record, and the external-dns readme's old claim that
# omitting cloudflare-proxied "defaults to proxied" was wrong, fixed there
# too. target below is the same tunnel ID as 02-wildcard-dns.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns-managed: "true"
    external-dns.alpha.kubernetes.io/target: b70df153-37a9-481b-a828-f5596bdcbf9f.cfargotunnel.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - homepage.spicyfajitas.com
      secretName: homepage-tls
  rules:
    - host: homepage.spicyfajitas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  name: web
