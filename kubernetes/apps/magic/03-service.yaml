# NodePort for both ports for now -- gives immediate access
# (http://10.100.10.12:30851) and a scrape target for the existing homelab
# Prometheus (10.100.10.12:30852) without waiting on cloudflared/Ingress.
# Once cloudflared/cert-manager/external-dns are in place (.claude-plan.md),
# switch `web` to a plain ClusterIP and front it with an Ingress instead --
# `metrics` should stay reachable the same way regardless, since the
# scraper lives outside the cluster on the docker host.
apiVersion: v1
kind: Service
metadata:
  name: edhrec-analyzer
  namespace: magic
  labels:
    app: edhrec-analyzer
spec:
  type: NodePort
  selector:
    app: edhrec-analyzer
  ports:
    - name: web
      port: 8501
      targetPort: web
      nodePort: 30851
    - name: metrics
      port: 8502
      targetPort: metrics
      nodePort: 30852
