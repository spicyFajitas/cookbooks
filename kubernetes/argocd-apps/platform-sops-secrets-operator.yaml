# Multi-source, same pattern as cert-manager/external-dns: chart from
# upstream, values.yaml from our git repo. The sops-age-key Secret itself
# is NOT managed here -- bootstrap-only, created by hand once per cluster,
# see readme.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sops-secrets-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://isindir.github.io/sops-secrets-operator/
      chart: sops-secrets-operator
      targetRevision: 0.28.0
      helm:
        valueFiles:
          - $values/kubernetes/platform/sops-secrets-operator/values.yaml
    - repoURL: https://github.com/spicyFajitas/cookbooks.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sops-secrets-operator
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
