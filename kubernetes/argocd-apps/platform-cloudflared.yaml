# Plain manifests, single git source -- no Helm chart involved.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/spicyFajitas/cookbooks.git
    targetRevision: HEAD
    path: kubernetes/platform/cloudflared
    # No directory.recurse (defaults false): secrets/ (SopsSecret manifest)
    # must never be auto-applied by Argo CD -- see the same note on
    # cert-manager-config in platform-cert-manager.yaml.
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
