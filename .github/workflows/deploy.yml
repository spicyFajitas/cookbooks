name: deploy

# Applies real infrastructure changes on merge to main. Gated behind the
# `production` GitHub Environment -- configure a required reviewer for it in
# repo Settings -> Environments -> production, otherwise this runs
# unattended. Runs entirely on the self-hosted runner
# (roles/github_actions_runner) since it must reach the private LAN.
#
# terraform apply runs for both stacks on every deploy regardless of which
# one changed -- safe because terraform apply is a no-op when there's
# nothing to change. ansible-playbook site.yml (no --tags) reconfigures
# every host -- safe because every role here is idempotent.

on:
  push:
    branches: [main, master]
    paths:
      - "terraform/**"
      - "ansible/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: [self-hosted, homelab]
    environment: production
    strategy:
      fail-fast: false
      matrix:
        stack: [proxmox, digital_ocean]
    defaults:
      run:
        working-directory: terraform/${{ matrix.stack }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - name: terraform apply
        env:
          TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
          TF_VAR_do_api_token: ${{ secrets.DO_API_TOKEN }}
        run: terraform apply -auto-approve -input=false

  ansible-deploy:
    needs: terraform-apply
    runs-on: [self-hosted, homelab]
    environment: production
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install ansible

      - run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault-pass.txt

      - name: Run site.yml
        env:
          PROXMOX_URL: ${{ secrets.PROXMOX_API_URL }}
          PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
          PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
          PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: ansible-playbook site.yml -i inventory --vault-password-file vault-pass.txt

      - name: Clean up vault password file
        if: always()
        run: rm -f vault-pass.txt
